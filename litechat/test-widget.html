<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Widget Test</title>
    <style>
        body {
            font-family: sans-serif;
            padding: 20px;
        }

        .controls {
            margin-bottom: 20px;
        }

        button {
            padding: 8px 16px;
            margin-right: 10px;
            cursor: pointer;
        }

        #custom-container {
            border: 2px dashed #ccc;
            padding: 20px;
            margin-top: 20px;
            min-height: 100px;
        }
    </style>
</head>

<body>
    <h1>Widget Control Test</h1>

    <div class="controls">
        <button id="btn-show">Show</button>
        <button id="btn-hide">Hide</button>
    </div>

    <div id="custom-container">
        Custom Container (ID: my-widget-root)
    </div>

    <script type="module">
        import { initAiChat } from '/dist-widget/litechat-widget.es.js';

        console.log('Initializing widget...');

        const widget = initAiChat({
            // containerId: 'my-widget-root',
            defaultOpen: false,
            defaultShow: true,
            config: {
                VITE_APP_TITLE: 'Test Chat (Demo)',
                VITE_AI_TYPE: 'demo',
                VITE_OPENAI_BASE_URL: 'http://127.0.0.1:6039',
                VITE_FLOAT_BALL_WELCOME_CONTENTS: '["要帮忙吗?", "需要解决什么问题，点我看看～～"]',
                // VITE_FLOAT_BALL_IMAGE: 'https://a5img.pncdn.cn/2024/0704/1720083839414.gif'
            }
        });

        console.log('Widget initialized:', widget);

        document.getElementById('btn-show').onclick = () => widget.show();
        document.getElementById('btn-hide').onclick = () => widget.hide();

        // Expose to window for console testing
        window.testWidget = widget;
    </script>
</body>

</html>
