<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LiteChat Widget Demo</title>
    <style>
        body {
            font-family: sans-serif;
            background: #f0f2f5;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        .content {
            text-align: center;
            max-width: 600px;
            padding: 20px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>
    <div class="content">
        <h1>LiteChat Widget Demo</h1>
        <p>This page demonstrates the embeddable AI Chat widget.</p>
        <p>The widget should appear in the bottom right corner.</p>
        <button onclick="window.AiChatWidget.initAiChat({ defaultOpen: true })">Re-init Widget</button>
    </div>

    <!-- Import the widget script (assuming it's built or served via Vite dev server) -->
    <!-- In dev mode, we import the entry point directly as module -->
    <script type="module">
        import { initAiChat } from '/src/widget/index.ts';
        
        initAiChat({
            config: {
                VITE_APP_TITLE: 'Demo Chat',
                VITE_API_BASE_URL: 'http://localhost:3000/api'
            },
            defaultOpen: false
        });

        // Expose for button
        window.AiChatWidget = { initAiChat };
    </script>
</body>
</html>
