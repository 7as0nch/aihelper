<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LiteChat Widget Production Demo (UMD)</title>
    <style>
        body {
            font-family: sans-serif;
            background: #f0f2f5;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }

        .content {
            text-align: center;
            max-width: 600px;
            padding: 20px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }
    </style>
    <!-- Import UMD Build -->
    <!-- <link rel="stylesheet" href="/dist-widget/litechat.css"> -->
</head>

<body class="bg-gray-50">
    <div class="min-h-screen flex flex-col items-center justify-center p-4">
        <div class="bg-white p-8 rounded-xl shadow-lg max-w-md w-full text-center">
            <h1 class="text-2xl font-bold text-gray-900 mb-4">LiteChat Widget Production Demo (UMD)</h1>
            <p class="text-gray-600 mb-8">This page demonstrates the built widget using UMD.</p>

            <button onclick="reInitWidget()"
                class="px-6 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition-colors">
                Re-init Widget
            </button>
        </div>
    </div>
    <script src="/dist-widget/litechat-widget.umd.js"></script>
    <script>
        let widgetInstance = null;

        function reInitWidget() {
            if (widgetInstance) {
                widgetInstance.unmount();
            }

        }
        window.AiChatWidget.initAiChat({
            config: {
                VITE_APP_TITLE: 'Prod Chat UMD',
                VITE_API_BASE_URL: 'http://localhost:3000/api'
            },
            defaultOpen: true
        });
        // Auto init
        reInitWidget();
    </script>
</body>

</html>
