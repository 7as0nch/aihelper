<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LiteChat Widget Production Demo (ES)</title>
    <style>
        body {
            font-family: sans-serif;
            background: #f0f2f5;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }

        .content {
            text-align: center;
            max-width: 600px;
            padding: 20px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }
    </style>
</head>

<body>
    <div class="content">
        <h1>LiteChat Widget Production Demo (ES)</h1>
        <p>This page demonstrates the built widget using ES Modules.</p>
    </div>

    <!-- <link rel="stylesheet" href="/dist-widget/litechat.css"> -->
    <script type="module">
        import { initAiChat } from '/dist-widget/litechat-widget.es.js';

        initAiChat({
            config: {
                VITE_APP_TITLE: 'Prod Chat ES',
                VITE_API_BASE_URL: 'http://localhost:3000/api'
            },
            defaultOpen: true
        });
    </script>
</body>

</html>
