                aiModel:
                    $ref: '#/components/schemas/chat.v1.AIModel'
                content:
                    type: string
                reasoningContent:
                    type: string
                timestamp:
                    type: string
                quoteId:
                    type: string
                quoteContent:
                    type: string
                quoteSearchLinks:
                    type: array
                    items:
                        $ref: '#/components/schemas/chat.v1.QuoteSearchLink'
                tokenUsage:
                    $ref: '#/components/schemas/chat.v1.TokenUsage'
                callingTools:
                    type: array
                    items:
                        $ref: '#/components/schemas/chat.v1.CallingTool'
                attachments:
                    type: array
                    items:
                        $ref: '#/components/schemas/chat.v1.Attachment'
                isStreaming:
                    type: boolean
            description: |-
                export interface Message {
                     id: string;
                     role: 'user' | 'assistant' | 'human'; // 用户，ai，人工客服
                     aiModel?: AIModel; // 选择的AI模型。
                     content: string;
                     reasoning_content?: string; // 深度思考内容。
                     timestamp: number; // 消息发送时间。
                     quoteId?: string; // 引用消息ID。
                     quoteContent?: string; // 引用消息内容。
                     quoteSearchLinks?: QuoteSearchLink[]; // 联网搜索引用文章链接和内容。
                     tokenUsage?: { // token消耗累计。
                         currentTokens: number; // 当前消耗
                         totalTokens: number; // 累计消耗
                     };
                     callingTools?: CallingTool[]; // agent工具调用情况。
                     attachments?: Attachment[]; // 生成或者发送的附件/图片。
                 }
        chat.v1.MessagesReply:
            type: object
            properties:
                messages:
                    type: array
                    items:
                        $ref: '#/components/schemas/chat.v1.Message'
                total:
                    type: integer
                    format: int32
        chat.v1.QuoteSearchLink:
            type: object
            properties:
                url:
                    type: string
                title:
                    type: string
                content:
                    type: string
                highlight:
                    type: array
                    items:
                        type: string
            description: |-
                export interface QuoteSearchLink {
                     url: string;
                     title: string;
                     content: string;
                     highlight: string[];
                 }
        chat.v1.SendStreamReply:
            type: object
            properties:
                message:
                    $ref: '#/components/schemas/chat.v1.Message'
        chat.v1.SendStreamRequest:
            type: object
            properties:
                curMessage:
                    $ref: '#/components/schemas/chat.v1.Message'
                history:
                    type: array
                    items:
                        $ref: '#/components/schemas/chat.v1.Message'
                needTODOPlan:
                    type: string
                curSessionID:
                    type: string
            description: Request for sending a message
        chat.v1.TokenUsage:
            type: object
            properties:
                currentTokens:
                    type: string
                totalTokens:
                    type: string
