syntax = "proto3";

package report.v1;

import "google/api/annotations.proto";

option go_package = "backend/api/report/v1;v1";
option java_multiple_files = true;
option java_package = "dev.kratos.api.report.v1";
option java_outer_classname = "ReportProtoV1";

// The report service definition.
service Report {
  // Export user feedback data as Excel
  rpc ExportUserFeedback (ExportUserFeedbackRequest) returns (ExportUserFeedbackReply) {
    option (google.api.http) = {
      post: "/v1/report/export/userfeedback"
      body: "*"
    };
  }

  // Get export status
  rpc GetExportStatus (GetExportStatusRequest) returns (GetExportStatusReply) {
    option (google.api.http) = {
      get: "/v1/report/export/status/{export_id}"
    };
  }

  // Download exported file
  rpc DownloadExport (DownloadExportRequest) returns (DownloadExportReply) {
    option (google.api.http) = {
      get: "/v1/report/export/download/{export_id}"
    };
  }
}

// Request for exporting user feedback
message ExportUserFeedbackRequest {
  string start_date = 1;
  string end_date = 2;
  repeated string filters = 3;
  string user_id = 4;
}

// Reply for exporting user feedback
message ExportUserFeedbackReply {
  string export_id = 1;
  string status = 2;
  string message = 3;
}

// Request for getting export status
message GetExportStatusRequest {
  string export_id = 1;
}

// Reply for getting export status
message GetExportStatusReply {
  string export_id = 1;
  string status = 2;
  string file_url = 3;
  string error_message = 4;
  string created_at = 5;
  string updated_at = 6;
}

// Request for downloading export
message DownloadExportRequest {
  string export_id = 1;
}

// Reply for downloading export
message DownloadExportReply {
  bytes file_content = 1;
  string file_name = 2;
  string content_type = 3;
}