// The chat service definition.
service Auth {
  // Login
  rpc Login (LoginRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = {
      post: "/auth/login"
      body: "*"
    };
  }

  rpc Logout (LogoutRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = {
      get: "/auth/logout"
    };
  }
}

message LoginRequest {
  string username = 1;
  string password = 2;
}

message LogoutRequest {}

