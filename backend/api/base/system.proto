syntax = "proto3";

package base;

import "google/api/annotations.proto";

option go_package = "github.com/example/aichat/backend/api;base";
import "google/protobuf/empty.proto";
option java_multiple_files = true;
option java_package = "dev.kratos.api.base";
option java_outer_classname = "BaseProto";

// The chat service definition.
service System {

    // menu
    rpc Menu (google.protobuf.Empty) returns (MenuReply) {
        option (google.api.http) = {
            get: "/system/menu"
        };
    }

    rpc AllMenu (google.protobuf.Empty) returns (AllMenuReply) {
        option (google.api.http) = {
            get: "/system/menu/list"
        };
    }
}

message MenuReply {
  repeated Menu menu = 1;
}

message MenuMeta {
  string icon = 1;
  string link = 2;
  bool noCache = 3;
  string title = 4;
}


message Menu {
  bool alwaysShow = 1;
  repeated Menu children = 2;
  string component = 3;
  bool hidden = 4;
  MenuMeta meta = 5;
  string name = 6;
  string path = 7;
  string query = 8;
  string redirect = 9;
  int64 id = 10;
  int64 parentID = 11;
}

message AllMenuReply {
  repeated MenuItem menus = 1;
}

message MenuItem {
  int64 menuId = 1;
  string menuName = 2;
  string parentName = 3;
  int64 parentId = 4;
  int32 orderNum = 5;
  string path = 6;
  string component = 7;
  string query = 8;
  string isFrame = 9;
  string isCache = 10;
  string menuType = 11;
  string visible = 12;
  string status = 13;
  string perms = 14;
  string icon = 15;
  repeated MenuItem children = 16;
  string createTime = 17;
  string updateTime = 18;
  string createBy = 19;
  string updateBy = 20;
  string remark = 21; 
}