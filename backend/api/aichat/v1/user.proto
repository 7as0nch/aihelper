syntax = "proto3";

package aichat.user.v1;

import "google/api/annotations.proto";

option go_package = "github.com/aichat/backend/api/aichat/v1;v1";
option java_multiple_files = true;
option java_package = "dev.aichat.api.user.v1";
option java_outer_classname = "UserProtoV1";

// UserService 用户服务定义
service UserService {
  // 用户登录
  rpc Login (LoginRequest) returns (LoginReply) {
    option (google.api.http) = {
      post: "/api/v1/user/login"
      body: "*"
    };
  }

  // 用户注册
  rpc Register (RegisterRequest) returns (RegisterReply) {
    option (google.api.http) = {
      post: "/api/v1/user/register"
      body: "*"
    };
  }

  // 获取用户信息
  rpc GetUserInfo (GetUserInfoRequest) returns (GetUserInfoReply) {
    option (google.api.http) = {
      get: "/api/v1/user/info"
    };
  }
}

// LoginRequest 登录请求
message LoginRequest {
  string username = 1;
  string password = 2;
}

// LoginReply 登录响应
message LoginReply {
  bool success = 1;
  string message = 2;
  string token = 3;
  UserInfo data = 4;
}

// RegisterRequest 注册请求
message RegisterRequest {
  string username = 1;
  string email = 2;
  string password = 3;
}

// RegisterReply 注册响应
message RegisterReply {
  bool success = 1;
  string message = 2;
  UserInfo user = 3;
}

// GetUserInfoRequest 获取用户信息请求
message GetUserInfoRequest {
  uint64 user_id = 1;
}

// GetUserInfoReply 获取用户信息响应
message GetUserInfoReply {
  bool success = 1;
  UserInfo data = 2;
}

// UserInfo 用户信息
message UserInfo {
  uint64 user_id = 1;
  string username = 2;
  string email = 3;
  string role = 4;
  string created_at = 5;
  string last_login_at = 6;
}