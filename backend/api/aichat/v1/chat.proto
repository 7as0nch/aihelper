syntax = "proto3";

package aichat.chat.v1;

import "google/api/annotations.proto";

option go_package = "github.com/aichat/backend/api/aichat/v1;v1";
option java_multiple_files = true;
option java_package = "dev.aichat.api.chat.v1";
option java_outer_classname = "ChatProtoV1";

// ChatService 聊天服务定义
service ChatService {
  // 发送消息
  rpc SendMessage (SendMessageRequest) returns (SendMessageReply) {
    option (google.api.http) = {
      post: "/api/v1/chat/send"
      body: "*"
    };
  }

  // 获取聊天历史
  rpc GetChatHistory (GetChatHistoryRequest) returns (GetChatHistoryReply) {
    option (google.api.http) = {
      get: "/api/v1/chat/history"
    };
  }
}

// SendMessageRequest 发送消息请求
message SendMessageRequest {
  uint64 chat_id = 1;
  string content = 2;
  string type = 3;
  map<string, string> metadata = 4;
}

// SendMessageReply 发送消息响应
message SendMessageReply {
  bool success = 1;
  string message = 2;
  uint64 chat_id = 3;
  repeated MessageInfo messages = 4;
}

// GetChatHistoryRequest 获取聊天历史请求
message GetChatHistoryRequest {
  uint64 chat_id = 1;
  int32 page = 2;
  int32 page_size = 3;
}

// GetChatHistoryReply 获取聊天历史响应
message GetChatHistoryReply {
  bool success = 1;
  repeated MessageInfo messages = 2;
  int32 total = 3;
}

// MessageInfo 消息信息
message MessageInfo {
  uint64 id = 1;
  string content = 2;
  string type = 3;
  string from = 4;
  string created_at = 5;
  map<string, string> metadata = 6;
}