// The chat service definition.
service Chat {

  // History
  rpc History (HistoryRequest) returns (HistoryReply) {
    option (google.api.http) = {
      get: "/chat/history"
    };
    option (openapiv2.operation) = {
      summary: "获取聊天会话记录"
    };
  }

  // history by id 
  rpc HistoryById (HistoryRequest) returns (MessagesReply) {
    option (google.api.http) = {
      get: "/chat/history/{session_id}"
    };
    option (openapiv2.operation) = {
      summary: "根据会话ID获取聊天记录"
    };
  }

  // history rename by id 
  rpc HistoryRenameById (HistoryRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = {
      put: "/chat/history/{session_id}"
      body: "*"
    };
    option (openapiv2.operation) = {  
      summary: "根据会话ID重命名聊天记录"
    };
  }

  // delete history by id 
  rpc HistoryDeleteById (HistoryRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = {
      delete: "/chat/history/{session_id}"
    };
    option (openapiv2.operation) = {  
      summary: "根据会话ID删除聊天记录"
    };
  }

  // Create a new chat session
  rpc CreateSession (CreateSessionRequest) returns (HistorySession) {
    option (google.api.http) = {
      post: "/chat/session"
      body: "*"
    };
    option (openapiv2.operation) = {
      summary: "创建新会话"
    };
  }

  // Create a new message in a session
  rpc CreateMessage (CreateMessageRequest) returns (Message) {
    option (google.api.http) = {
      post: "/chat/message"
      body: "*"
    };
    option (openapiv2.operation) = {
      summary: "创建新消息"
    };
  }



  // Stream chat messages for real-time communication
  rpc SendStream (SendStreamRequest) returns (stream SendStreamReply) {
    option (google.api.http) = {
      post: "/chat/send"
      body: "*"
    };
  }
}

// export interface Attachment {
//     id: string;
//     type: 'image' | 'file';
//     name: string;
//     url?: string;
// }
message Attachment {
    string id = 1;
    string type = 2; // 'image' | 'file'
    string name = 3;
    string url = 4;
}

// export interface AIModel {
//     id: string;
//     modelName: string;
//     thinkingMode: 'smart' | 'deep' | 'quick'; // 思考类型，深度思考，快速思考，智能思考。
// }
message AIModel {
    string id = 1;
    string modelName = 2;
    string thinkingMode = 3; // 'smart' | 'deep' | 'quick'
    bool searchByWeb = 4;
}

// export interface CallingTool {
//     name: string;
//     description: string;
//     functionName: string;
// }
message CallingTool {
    string name = 1;
    string description = 2;
    string functionName = 3;
}

// export interface QuoteSearchLink {
//     url: string;
//     title: string;
//     content: string;
//     highlight: string[];
// }
message QuoteSearchLink {
    string url = 1;
    string title = 2;
    string content = 3;
    repeated string highlight = 4;
}

// export interface Message {
//     id: string;
//     role: 'user' | 'assistant' | 'human'; // 用户，ai，人工客服
//     aiModel?: AIModel; // 选择的AI模型。
//     content: string;
//     reasoning_content?: string; // 深度思考内容。
//     timestamp: number; // 消息发送时间。
//     quoteId?: string; // 引用消息ID。
//     quoteContent?: string; // 引用消息内容。
//     quoteSearchLinks?: QuoteSearchLink[]; // 联网搜索引用文章链接和内容。
//     tokenUsage?: { // token消耗累计。
//         currentTokens: number; // 当前消耗
//         totalTokens: number; // 累计消耗
//     };
//     callingTools?: CallingTool[]; // agent工具调用情况。
//     attachments?: Attachment[]; // 生成或者发送的附件/图片。
// }
message Message {
    int64 id = 1;
    string role = 2; // 'user' | 'assistant' | 'human'
    AIModel aiModel = 3; // 选择的AI模型。
    string content = 4;
    string reasoningContent = 5; // 深度思考内容。
    int64 timestamp = 6; // 消息发送时间。
    string quoteId = 7; // 引用消息ID。
    string quoteContent = 8; // 引用消息内容。
    repeated QuoteSearchLink quoteSearchLinks = 9; // 联网搜索引用文章链接和内容。
    TokenUsage tokenUsage = 10; // token消耗累计。
    repeated CallingTool callingTools = 11; // agent工具调用情况。
    repeated Attachment attachments = 12; // 生成或者发送的附件/图片。
    bool isStreaming = 13; // 是否流式响应。
}

message TokenUsage {
    int64 currentTokens = 1; // 当前消耗
    int64 totalTokens = 2; // 累计消耗
}



// history
message HistoryRequest {
  int64 session_id = 1;
  string name = 2;
  int32 page = 3;
  int32 page_size = 4;
}

message HistorySession {
  int64 id = 1;
  string title = 2;
  int64 updateTime = 3;
}

// Reply for history
message HistoryReply {
  repeated HistorySession sessions = 1;
  int32 total = 2;
}

message MessagesReply {
  repeated Message messages = 1;
  int32 total = 2;
}

message CreateSessionRequest {
  string title = 1;
  repeated Message messages = 2;
}

message CreateMessageRequest {
  int64 session_id = 1;
  string role = 2;
  string content = 3;
}



// Request for sending a message
message SendStreamRequest {
  Message curMessage = 1;
  repeated Message history = 2;
  string needTODOPlan = 3; // 是否需要生成待办计划。 'smart' | 'need' | 'no'
  int64 curSessionID = 4;
}
message SendStreamReply {
  Message message = 1;
}