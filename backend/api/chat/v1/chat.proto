syntax = "proto3";

package chat.v1;

import "google/api/annotations.proto";

option go_package = "backend/api/chat/v1;v1";
option java_multiple_files = true;
option java_package = "dev.kratos.api.chat.v1";
option java_outer_classname = "ChatProtoV1";
