// The chat service definition.
service Chat {
  // Send a chat message
  rpc SendMessage (SendMessageRequest) returns (SendMessageReply) {
    option (google.api.http) = {
      post: "/chat/msg"
      body: "*"
    };
  }

  // Get chat messages
  rpc GetMessages (GetMessagesRequest) returns (GetMessagesReply) {
    option (google.api.http) = {
      get: "/v1/chat/messages"
    };
  }



  // Stream chat messages for real-time communication
  rpc StreamMessages (StreamMessagesRequest) returns (stream StreamMessagesReply) {
    option (google.api.http) = {
      post: "/chat/send"
      body: "*"
    };
  }
}


// Request for sending a message
message SendMessageRequest {
  // // 用户输入的内容
  // string content = 1;
  // // 用户唯一标识符
  // string user_id = 2;
  // // 会话唯一标识符
  // string session_id = 3;
  // 最大生成令牌数
  int32 max_tokens = 4;
  // 使用的AI模型名称
  string model = 5;
  // 控制生成文本随机性的参数，值越高结果越随机
  float temperature = 6;
  // 控制生成文本多样性的参数，0-1之间
  float top_p = 7;
  // 存在惩罚因子，防止重复话题
  float presence_penalty = 8;
  // 频率惩罚因子，防止重复词汇
  float frequency_penalty = 9;
  // 聊天历史记录消息列表
  repeated Message messages = 10;
  // 是否启用流式响应
  bool stream = 11;
  // 密钥标识符
  string kid = 12;
  // 应用程序标识符
  string app_id = 13;
  // 是否包含附件
  bool has_attachment = 14;
  // 是否自动选择模型
  bool auto_select_model = 15;
}

// Message structure for chat history
message Message {
  // 消息发送者角色 ("system", "user", "assistant")
  string role = 1;
  // 消息内容
  string content = 2;
}

// Reply for sending a message
message SendMessageReply {
  string message_id = 1;
  bool success = 2;
  string error_message = 3;
}

// Request for getting messages
message GetMessagesRequest {
  string session_id = 1;
  int32 page = 2;
  int32 page_size = 3;
}

// Reply for getting messages
message GetMessagesReply {
  repeated ChatMessage messages = 1;
  int32 total = 2;
}

// Request for streaming messages
message StreamMessagesRequest {
  string session_id = 1;
}

// Reply for streaming messages
message StreamMessagesReply {
  ChatMessage message = 1;
}

// Chat message structure
message ChatMessage {
  string id = 1;
  string content = 2;
  string user_id = 3;
  string session_id = 4;
  string timestamp = 5;
  string type = 6; // e.g., "user", "assistant"
}