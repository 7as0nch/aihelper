syntax = "proto3";

package ai;

import "google/api/annotations.proto";
import "google/protobuf/empty.proto";
option go_package = "backend/api/ai;ai";
option java_multiple_files = true;
option java_package = "dev.kratos.api.ai";
option java_outer_classname = "AiProto";
import "protoc-gen-openapiv2/options/annotations.proto";
import "api/ai/agent.proto";
import "api/ai/model.proto";
import "api/ai/tool.proto";
import "api/ai/prompt.proto";
import "api/ai/application.proto";

service AI {
    // ========== AIAgent CRUD ==========
    rpc ListAgents(ListAgentsRequest) returns (ListAgentsReply) {
        option (google.api.http) = { get: "/api/ai/agents" };
    }
    rpc GetAgent(IdRequest) returns (AgentInfo) {
        option (google.api.http) = { get: "/api/ai/agents/{id}" };
    }
    rpc CreateAgent(CreateAgentRequest) returns (AgentInfo) {
        option (google.api.http) = { post: "/api/ai/agents", body: "*" };
    }
    rpc UpdateAgent(UpdateAgentRequest) returns (google.protobuf.Empty) {
        option (google.api.http) = { put: "/api/ai/agents/{id}", body: "*" };
    }
    rpc DeleteAgent(IdRequest) returns (google.protobuf.Empty) {
        option (google.api.http) = { delete: "/api/ai/agents/{id}" };
    }

    // ========== AIModel CRUD ==========
    rpc ListModels(ListModelsRequest) returns (ListModelsReply) {
        option (google.api.http) = { get: "/api/ai/models" };
    }
    rpc GetModel(IdRequest) returns (ModelInfo) {
        option (google.api.http) = { get: "/api/ai/models/{id}" };
    }
    rpc CreateModel(CreateModelRequest) returns (ModelInfo) {
        option (google.api.http) = { post: "/api/ai/models", body: "*" };
    }
    rpc UpdateModel(UpdateModelRequest) returns (google.protobuf.Empty) {
        option (google.api.http) = { put: "/api/ai/models/{id}", body: "*" };
    }
    rpc DeleteModel(IdRequest) returns (google.protobuf.Empty) {
        option (google.api.http) = { delete: "/api/ai/models/{id}" };
    }

    // ========== AIPromptTemplate CRUD ==========
    rpc ListPrompts(ListPromptsRequest) returns (ListPromptsReply) {
        option (google.api.http) = { get: "/api/ai/prompts" };
    }
    rpc GetPrompt(IdRequest) returns (PromptInfo) {
        option (google.api.http) = { get: "/api/ai/prompts/{id}" };
    }
    rpc CreatePrompt(CreatePromptRequest) returns (PromptInfo) {
        option (google.api.http) = { post: "/api/ai/prompts", body: "*" };
    }
    rpc UpdatePrompt(UpdatePromptRequest) returns (google.protobuf.Empty) {
        option (google.api.http) = { put: "/api/ai/prompts/{id}", body: "*" };
    }
    rpc DeletePrompt(IdRequest) returns (google.protobuf.Empty) {
        option (google.api.http) = { delete: "/api/ai/prompts/{id}" };
    }

    // ========== AITool CRUD ==========
    rpc ListTools(ListToolsRequest) returns (ListToolsReply) {
        option (google.api.http) = { get: "/api/ai/tools" };
    }
    rpc GetTool(IdRequest) returns (ToolInfo) {
        option (google.api.http) = { get: "/api/ai/tools/{id}" };
    }
    rpc CreateTool(CreateToolRequest) returns (ToolInfo) {
        option (google.api.http) = { post: "/api/ai/tools", body: "*" };
    }
    rpc UpdateTool(UpdateToolRequest) returns (google.protobuf.Empty) {
        option (google.api.http) = { put: "/api/ai/tools/{id}", body: "*" };
    }
    rpc DeleteTool(IdRequest) returns (google.protobuf.Empty) {
        option (google.api.http) = { delete: "/api/ai/tools/{id}" };
    }
    rpc BatchBindTools(BatchBindToolsRequest) returns (google.protobuf.Empty) {
        option (google.api.http) = { post: "/api/ai/agents/{agent_id}/tools", body: "*" };
    }

    // ========== Application CRUD ==========
    rpc ListApplications(ListApplicationsRequest) returns (ListApplicationsReply) {
        option (google.api.http) = { get: "/api/ai/applications" };
    }
    rpc GetApplication(IdRequest) returns (ApplicationInfo) {
        option (google.api.http) = { get: "/api/ai/applications/{id}" };
    }
    rpc CreateApplication(CreateApplicationRequest) returns (ApplicationInfo) {
        option (google.api.http) = { post: "/api/ai/applications", body: "*" };
    }
    rpc UpdateApplication(UpdateApplicationRequest) returns (google.protobuf.Empty) {
        option (google.api.http) = { put: "/api/ai/applications/{id}", body: "*" };
    }
    rpc DeleteApplication(IdRequest) returns (google.protobuf.Empty) {
        option (google.api.http) = { delete: "/api/ai/applications/{id}" };
    }
}

// ========== Common ==========
message IdRequest { 
    int64 id = 1; 
}

message EmptyReply {
}