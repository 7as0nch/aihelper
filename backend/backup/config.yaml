# 服务器配置
server:
  port: 8080

# 数据库配置
database:
  driver: mysql
  host: localhost
  port: 3306
  username: root
  password: password
  dbname: aichat
  charset: utf8mb4
  parseTime: true
  loc: Local

# Redis配置
redis:
  host: localhost
  port: 6379
  db: 0
  password: ""

# JWT配置
jwt:
  secret: your-secret-key
  expire: 720 # 小时

# 日志配置
log:
  level: info
  file: ./logs/app.log
  max_size: 100 # MB
  max_age: 30 # 天
  max_backups: 7

# MCP服务配置
mcp:
  enabled: true
  servers:
    - name: mcp.config.usrlocalmcp.gitee
      url: https://gitee.com/api/v5
      timeout: 30s
    - name: mcp.config.usrlocalmcp.context7
      url: https://context7.example.com/api
      timeout: 60s