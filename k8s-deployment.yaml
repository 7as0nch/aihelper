apiVersion: v1
kind: Namespace
metadata:
  name: aichat # 独立命名空间，用于隔离 aichat 项目的所有资源
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: backend-config
  namespace: aichat
data:
  config.yaml: | # 后端服务的核心配置文件，通过挂载方式映射到容器内部
    server:
      http:
        addr: 0.0.0.0:8000
        timeout: 1000s
      grpc:
        addr: 0.0.0.0:9000
        timeout: 1000s
    data:
      database:
        driver: mysql
        source: read_rentianhua:yNxruv24C26@tcp(rm-bp1hw1ynxruv24c26jo.mysql.rds.aliyuncs.com:3306)/rth?parseTime=True&loc=Local
      pg_database:
        host: 115.120.248.67
        port: 31042
        user: pgadmin
        password: "123456"
        dbname: pgdb
        sslmode: disable
      redis:
        addr: 127.0.0.1:6379
        read_timeout: 0.2s
        write_timeout: 0.2s
    log:
      maxAge: 30
      level: "debug"
      format: "console"
      director: "./logs"
      encodeLevel: "CapitalColorLevelEncoder"
---
# 1. 后端服务 (Backend API) - AI 核心逻辑处理
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: aichat
spec:
  replicas: 2 # 基础副本数为 2，保证在一个 Pod 重启时服务不中断（高可用）
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
      - name: backend
        image: 7as0nch/aichat-backend:v1.0.2
        resources:
          # 在 4C4G 机器上，合理分配资源是关键
          requests: # 容器启动时保证分配的最小资源，K8s 调度依据
            cpu: "200m"
            memory: "256Mi"
          limits: # 允许容器使用的最大资源，防止单个 Pod 异常（如内存泄漏）导致宿主机死机
            cpu: "800m" 
            memory: "512Mi"
        ports:
        - containerPort: 8000
        volumeMounts:
        - name: config-volume
          mountPath: /data/conf # 挂载配置文件，修改 ConfigMap 后重启 Pod 即可生效
      volumes:
      - name: config-volume
        configMap:
          name: backend-config
---
# 后端自动扩缩容配置 (HPA)
# 作用：在高并发流量进入时，自动增加副本数；流量低峰时自动回收，节省资源
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: backend-hpa
  namespace: aichat
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: backend
  minReplicas: 2 # 维持最少 2 个副本
  maxReplicas: 5 # 根据 4C4G 服务器压力，最大扩展到 5 个以防压垮宿主机
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 60 # 当 CPU 平均使用率超过 60% 时触发扩容
---
# 2. 管理端 (Backweb) - Nginx 托管的静态网页
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backweb
  namespace: aichat
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backweb
  template:
    metadata:
      labels:
        app: backweb
    spec:
      containers:
      - name: backweb
        image: 7as0nch/aichat-backweb:v1.0.2
        resources:
          # 网页服务非常轻量，仅需极少资源
          requests:
            cpu: "50m"
            memory: "64Mi"
          limits:
            cpu: "200m"
            memory: "128Mi"
        ports:
        - containerPort: 80
---
# 3. 客户端 (Litechat) - 用户聊天前端界面
apiVersion: apps/v1
kind: Deployment
metadata:
  name: litechat
  namespace: aichat
spec:
  replicas: 2
  selector:
    matchLabels:
      app: litechat
  template:
    metadata:
      labels:
        app: litechat
    spec:
      containers:
      - name: litechat
        image: 7as0nch/aichat-litechat:v1.0.2
        resources:
          requests:
            cpu: "50m"
            memory: "64Mi"
          limits:
            cpu: "200m"
            memory: "128Mi"
        ports:
        - containerPort: 80
---
# 服务 (Services) 定义 - 内部负载均衡
# 统一使用 ClusterIP 类型，因为外部访问全部交给 Ingress 代理
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: aichat
spec:
  selector:
    app: backend
  ports:
  - name: http
    port: 8000
    targetPort: 8000
  type: ClusterIP
---
apiVersion: v1
kind: Service
metadata:
  name: backweb
  namespace: aichat
spec:
  selector:
    app: backweb
  ports:
  - name: http
    port: 8081
    targetPort: 80
  type: ClusterIP
---
apiVersion: v1
kind: Service
metadata:
  name: litechat
  namespace: aichat
spec:
  selector:
    app: litechat
  ports:
  - name: http
    port: 8082
    targetPort: 80
  type: ClusterIP
---
# 跨命名空间访问代理 (ExternalName)
# 作用：允许 aichat 命名空间下的 Ingress 能够访问到其它命名空间（如 kuboard）下的服务
apiVersion: v1
kind: Service
metadata:
  name: kuboard-proxy-svc
  namespace: aichat
spec:
  type: ExternalName
  externalName: kuboard-v3-service.kuboard.svc.cluster.local 
  ports:
  - port: 80
---
# 4. 统一 Ingress 入口 - 对外网关
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: aichat-ingress
  namespace: aichat
  annotations:
    kubernetes.io/ingress.class: nginx
    # 大文件支持
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    
    # 【核心配置】针对 AI 流式输出 (SSE) 的优化
    # 1. 禁用代理缓冲：Nginx 不会等待凑够一定数据才发送，实现真正的逐字即时蹦出
    nginx.ingress.kubernetes.io/proxy-buffering: "off"
    # 2. 超时保活：长连接防止 AI 思考时间过长导致被 Nginx 强行断开（10分钟）
    nginx.ingress.kubernetes.io/proxy-read-timeout: "600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "600"
    
    # 【高可用配置】会话亲和性 (Sticky Sessions)
    # 作用：通过 Cookie 确保同一用户的刷新/重连请求始终落到同一个后端 Pod 上
    # 理由：后端 activeStreams 缓存在 Pod 内存中，不跨节点共享，此配置保证了“断点续传”的一致性
    nginx.ingress.kubernetes.io/affinity: "cookie"
    nginx.ingress.kubernetes.io/session-cookie-name: "route"
    nginx.ingress.kubernetes.io/session-cookie-hash: "sha1"
spec:
  ingressClassName: nginx
  rules:
  - host: chat.aihelper.chat # 用户访问域名
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: litechat
            port:
              number: 8082
  - host: admin.aihelper.chat # 管理端域名
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: backweb
            port:
              number: 8081
  - host: api.aihelper.chat # API 接口域名
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: backend
            port:
              number: 8000
  - host: hk.aihelper.chat # Kuboard 面板域名
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: kuboard-proxy-svc 
            port:
              number: 80
